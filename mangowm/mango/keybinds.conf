# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# NOTE: Terminal
bind  =  Super,  return,  spawn,  ghostty

# NOTE: Session
bind  =  Super,        Escape,  spawn,  qs -c noctalia-shell ipc call lockScreen lock
bind  =  Super+Shift,  Escape,  spawn,  qs -c noctalia-shell ipc call sessionMenu toggle

# NOTE: File managers
bind  =  Super,        E,  toggle_named_scratchpad,  com.ghostty.yazi,  none,  ghostty --class=com.ghostty.yazi --command=yazi
bind  =  Super+Shift,  E,  spawn,                    nautilus

# NOTE: Noctalia
bind  =  Super,  comma,  spawn,  qs -c noctalia-shell ipc call settings toggle

# NOTE: Messaging
bind  =  Super,  W,  toggle_named_scratchpad,  chrome-hnpfjngllnobngcgfapefoaidbinmjnm-Default, none, gio launch ~/.local/share/applications/com.google.Chrome.flextop.chrome-hnpfjngllnobngcgfapefoaidbinmjnm-Default.desktop
bind  =  Super,  D,  toggle_named_scratchpad,  vesktop, none, flatpak run dev.vencord.Vesktop

# NOTE: Vicinae
bind  =  Alt_l,        SPACE,   spawn,        vicinae vicinae://toggle
bind  =  Super,        V,       spawn_shell,  vicinae close || vicinae vicinae://extensions/vicinae/clipboard/history
bind  =  Super,        PERIOD,  spawn_shell,  vicinae close || vicinae vicinae://extensions/vicinae/core/search-emojis
# TODO: create a extension to search nerdy icons
# bind  =  Super+Shift,  COMMA,   spawn,        vicinae close || ~/.config/rofi/scripts/nerdy.sh | vicinae dmenu -p "Nerdy > "
bind  =  Super,        T,       spawn_shell,  vicinae close || ~/.dotfiles/hyprland/dmenu/scripts/quick-actions.sh vicinae
# bind  =  Super,        TAB,     spawn,        vicinae vicinae://extensions/vicinae/wm/switch-windows

# NOTE: Mic
bind  =  Super+Shift,  M,  spawn,  wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# NOTE: Print
# TODO: use menu dialog to ask if want to use loupe or not
# bind = None,  PRINT, spawn_shell, grim -l 0 -g "$(slurp)" - | wl-copy
# bind = Alt_l, PRINT, spawn_shell, hyprshot -m window -m active -- loupe
bind = Shift, PRINT, spawn_shell, grim -l 0 -g "$(slurp)" - | wl-copy
# bind = Ctrl,  PRINT, spawn_shell, hyprshot -m output -- loupe

# NOTE: Hyprpicker
bind  =  Super,  C,  spawn,  hyprpicker -a

# NOTE: Paste
bind  =  Super+Shift,  V,  spawn_shell,  sh -c "cliphist list | head -n 1 | cliphist decode | wtype -s 500 -d 50 -"

# NOTE: Media control
bind  =  None,  XF86AudioRaiseVolume,  spawn_shell,  wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.0
bind  =  None,  XF86AudioLowerVolume,  spawn_shell,  wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  =  None,  XF86AudioMute,         spawn_shell,  wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  =  None,  XF86AudioMicMute,      spawn_shell,  wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind  =  None,  XF86AudioPlay,  spawn_shell,  playerctl play-pause
bind  =  None,  XF86AudioStop,  spawn_shell,  playerctl stop
bind  =  None,  XF86AudioPrev,  spawn_shell,  playerctl previous
bind  =  None,  XF86AudioNext,  spawn_shell,  playerctl next

# NOTE: Brightness control
bind  =  None,  XF86MonBrightnessUp,    spawn_shell,  brightnessctl --class=backlight set 5%+
bind  =  None,  XF86MonBrightnessDown,  spawn_shell,  brightnessctl --class=backlight set 5%-

# NOTE: Scratchpads
bind  = Super, B, toggle_named_scratchpad, eu.betterbird.Betterbird, none
bind  = Super, S, toggle_scratchpad
bind  = Super+Shift, S, minimized

# NOTE: Window manager
bind  =  Super,       Q,    killclient,
bind  =  Super,       M,    togglemaximizescreen,
bind  =  Super+Ctrl,  M,    togglefullscreen
bind  =  Super,       F,    togglefloating,
bind  =  Super,       Tab,  toggleoverview,

bind = Super, R, switch_proportion_preset,

# reload config
bind  =  Super+Shift,  R,  reload_config

# exit
# bind=Super,m,quit

# switch window focus
bind=Alt,Tab,focusstack,next
# bind=Super,Left,focusdir,left
# bind=Super,Right,focusdir,right
# bind=Super,Up,focusdir,up
# bind=Super,Down,focusdir,down
bind=Super,h,focusdir,left
bind=Super,l,focusdir,right
bind=Super,k,focusdir,up
bind=Super,j,focusdir,down

# swap window
bind=Super+Shift,Up,exchange_client,up
bind=Super+Shift,Down,exchange_client,down
bind=Super+Shift,Left,exchange_client,left
bind=Super+Shift,Right,exchange_client,right
bind=Super+Shift,k,exchange_client,up
bind=Super+Shift,j,exchange_client,down
bind=Super+Shift,h,exchange_client,left
bind=Super+Shift,l,exchange_client,right

# switch window status
# bind=Super,g,toggleglobal,
# bind=Super,Tab,toggleoverview,
# bind=Super,f,togglefloating,
# bind=ALT,a,togglemaximizescreen,
# bind=ALT,f,togglefullscreen,
# bind=ALT+Shift,f,togglefakefullscreen,
bind=Super,i,minimized,
# bind=Super,o,toggleoverlay,
bind=Super+Shift,I,restore_minimized
# bind=ALT,z,toggle_scratchpad

# scroller layout
# bind=ALT,e,set_proportion,1.0
# bind=ALT,x,switch_proportion_preset,

# switch layout
# bind=Super,n,switch_layout

# tag switch
bind=Super,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
bind=Super,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+Super,Left,tagtoleft,0
# bind=CTRL+Super,Right,tagtoright,0

bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Super+Shift,1,tag,1,0
bind=Super+Shift,2,tag,2,0
bind=Super+Shift,3,tag,3,0
bind=Super+Shift,4,tag,4,0
bind=Super+Shift,5,tag,5,0
bind=Super+Shift,6,tag,6,0
bind=Super+Shift,7,tag,7,0
bind=Super+Shift,8,tag,8,0
bind=Super+Shift,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=Super+Alt,Left,tagmon,left
bind=Super+Alt,Right,tagmon,right
bind=alt+shift,H,focusmon,left
bind=alt+shift,L,focusmon,right
bind=Super+Alt,H,tagmon,left
bind=Super+Alt,L,tagmon,right

# gaps
# bind=ALT+Shift,X,incgaps,1
# bind=ALT+Shift,Z,incgaps,-1
# bind=ALT+Shift,R,togglegaps

# movewin
bind=Super+CTRL,Up,movewin,+0,-50
bind=Super+CTRL,Down,movewin,+0,+50
bind=Super+CTRL,Left,movewin,-50,+0
bind=Super+CTRL,Right,movewin,+50,+0
bind=Super+CTRL,K,movewin,+0,-50
bind=Super+CTRL,J,movewin,+0,+50
bind=Super+CTRL,H,movewin,-50,+0
bind=Super+CTRL,L,movewin,+50,+0

# resizewin
bind=Super+Shift+CTRL,Up,resizewin,+0,-50
bind=Super+Shift+CTRL,Down,resizewin,+0,+50
bind=Super+Shift+CTRL,Left,resizewin,-50,+0
bind=Super+Shift+CTRL,Right,resizewin,+50,+0
bind=Super+Shift+CTRL,K,resizewin,+0,-50
bind=Super+Shift+CTRL,J,resizewin,+0,+50
bind=Super+Shift+CTRL,H,resizewin,-50,+0
bind=Super+Shift+CTRL,L,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=Super,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=Super,btn_right,moveresize,curresize


# Axis Bindings
axisbind=Super,UP,viewtoleft_have_client
axisbind=Super,DOWN,viewtoright_have_client
