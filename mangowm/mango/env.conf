env = GDK_SCALE,1
env = __GL_VRR_ALLOWED,0

env = AQ_DRM_DEVICES,$HOME/.config/hypr-cards/cardIntel:$HOME/.config/hypr-cards/cardNvidia
env = WLR_DRM_DEVICES,$HOME/.config/hypr-cards/cardIntel:$HOME/.config/hypr-cards/cardNvidia

env = XDG_PICTURES_DIR,Pictures/Screenshots

env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GSK_RENDERER,ngl

env = ADW_DEBUG_COLOR_SCHEME,prefer-dark

env = GTK_THEME,Kanagawa-Dark-Dragon
env = EDITOR,nvim

env = EDGE_PATH,/var/lib/flatpak/app/com.google.Chrome/current/active/export/bin/com.google.Chrome
env = CHROME_PATH,/var/lib/flatpak/app/com.google.Chrome/current/active/export/bin/com.google.Chrome

env = QT_IM_MODULE,fcitx
env = XMODIFIERS,@im=fcitx
env = LC_CTYPE,pt_BR.UTF-8
