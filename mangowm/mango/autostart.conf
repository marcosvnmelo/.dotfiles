# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = qs -c noctalia-shell
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = systemctl --user start hypridle.service
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = fcitx5 -d

exec-once = bash -c 'until systemctl is-active --quiet --user arrpc.service; do sleep 1; done && sleep 7 && flatpak run dev.vencord.Vesktop'
exec-once = gio launch ~/.local/share/applications/com.google.Chrome.flextop.chrome-hnpfjngllnobngcgfapefoaidbinmjnm-Default.desktop

exec-once = flatpak run com.ulduzsoft.Birdtray

exec-once = vicinae server
