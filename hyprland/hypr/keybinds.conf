# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal    = ghostty
$fileManager = nautilus
$menu        = rofi
$dmenu       = vicinae
$noctaliaIpc = qs -c noctalia-shell ipc call

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod  = SUPER # Sets "Windows" key as main modifier
$shiftMod = $mainMod SHIFT
$ctrlMod  = $mainMod CTRL

$scriptDir = ~/.dotfiles/hyprland/scripts

# Binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# NOTE: Terminal
bind  =  $mainMod,  return,  exec,  $terminal

# NOTE: Session
bind = $mainMod,  ESCAPE, exec, hyprlock
# bind = $shiftMod, ESCAPE, exec, pkill -x $menu || $menu -show p -modi p:'rofi-power-menu' -config power
bind = $shiftMod, ESCAPE, exec, $noctaliaIpc sessionMenu toggle

# NOTE: File managers
bind = $mainMod,  E, exec, $terminal --command=yazi
bind = $shiftMod, E, exec, $fileManager

# NOTE: Noctalia
bind = $mainMod, comma, exec, $noctaliaIpc settings toggle

# NOTE: Messaging
bind = $mainMod, W, exec, $scriptDir/scratchpad.sh "whatsapp" "chrome-hnpfjngllnobngcgfapefoaidbinmjnm-Default" "gio launch ~/.local/share/applications/com.google.Chrome.flextop.chrome-hnpfjngllnobngcgfapefoaidbinmjnm-Default.desktop"
bind = $mainMod, D, exec, $scriptDir/scratchpad.sh "vesktop" "vesktop" "flatpak run dev.vencord.Vesktop"

# NOTE: Vicinae
bind = Alt_l,     SPACE,  exec, $dmenu vicinae://toggle
bind = $mainMod,  V,      exec, $dmenu close || $dmenu vicinae://extensions/vicinae/clipboard/history
bind = $mainMod,  Period, exec, $dmenu close || $dmenu vicinae://extensions/vicinae/core/search-emojis
# TODO: create a extension to search nerdy icons
# bind = $shiftMod, Period, exec, vicinae close || ~/.config/rofi/scripts/nerdy.sh | vicinae dmenu -p "Nerdy > "
bind = $mainMod,  T,      exec, $dmenu close || ~/.dotfiles/hyprland/dmenu/scripts/quick-actions.sh vicinae
bind = $mainMod,  TAB,    exec, $dmenu vicinae://extensions/vicinae/wm/switch-windows

# NOTE: Mic
bind = $shiftMod, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# NOTE: Hyprshot
# TODO: use menu dialog to ask if want to use loupe or not
bind = ,      PRINT, exec, hyprshot -m window -- loupe
bind = Alt_l, PRINT, exec, hyprshot -m window -m active -- loupe
bind = SHIFT, PRINT, exec, hyprshot -m region -- loupe
bind = CTRL,  PRINT, exec, hyprshot -m output -- loupe

# NOTE: Hyprpicker
bind = $mainMod, C, exec, hyprpicker -a

# NOTE: Paste
bind = $shiftMod, V, exec, sh -c "cliphist list | head -n 1 | cliphist decode | wtype -s 500 -d 50 -"

# NOTE: Media control
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle


bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous

# NOTE: Brightness control
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# NOTE: Scratchpads
# Example special workspace (scratchpad)
bind = $mainMod,  S, togglespecialworkspace, magic
bind = $shiftMod, S, movetoworkspace,        special:magic

# NOTE: Window manager
bind = $mainMod, Q, killactive,     
bind = $mainMod, M, layoutmsg,      colresize 1.0
bind = $ctrlMod, M, fullscreen,     1
bind = $mainMod, F, togglefloating, 
bind = $mainMod, P, pseudo,         active         # dwindle
bind = $mainMod, O, layoutmsg,      togglesplit    # dwindle
# bindon = $mainMod,  SPACE,  exec,           pkill -x fcitx5 || fcitx5

bind  =  $mainMod,  R,  layoutmsg,  colresize +conf

bind = Alt, TAB,       cyclenext
bind = Alt, TAB,       bringactivetotop
bind = Alt SHIFT, TAB, cyclenext,       prev
bind = Alt SHIFT, TAB, bringactivetotop

# bindr = $mainMod, W, exec, killall waybar || waybar
# bindr = $mainMod, W, exec, qs -c noctalia-shell kill || qs -c noctalia-shell

# NOTE: Rofi
# bind = Alt_l,     SPACE,          exec, pkill -x $menu || $menu -show drun
# bind = Alt_l      SHIFT,   SPACE, exec, pkill -x $menu || $menu -show calc -modi calc -no-show-match -no-sort -config regular
# bind = $mainMod,  V,              exec, pkill -x $menu || $menu -modi cliphist-rofi-img -show cliphist-rofi-img -show-icons -config regular
# bind = $mainMod,  Period,        exec, pkill -x $menu || $menu -modi "emoji,nerdy" -show emoji -config regular
bind = $shiftMod,  Period,        exec, pkill -x $menu || $menu -modi "emoji,nerdy" -show nerdy -config regular
# bind = $mainMod,  T,              exec, pkill -x $menu || ~/.dotfiles/hyprland/dmenu/scripts/quick-actions.sh rofi
# bind = $mainMod,  TAB,            exec, pkill -x $menu || $menu -modi "window" -show window

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move active window around current workspace with mainMod + SHIFT + CTRL [←→↑↓]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
binded = $shiftMod, H, Move activewindow left,  exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
binded = $shiftMod, L, Move activewindow right, exec, $moveactivewindow 30 0  || hyprctl dispatch movewindow r
binded = $shiftMod, K, Move activewindow up,    exec, $moveactivewindow 0 -30 || hyprctl dispatch movewindow u
binded = $shiftMod, J, Move activewindow down,  exec, $moveactivewindow 0 30  || hyprctl dispatch movewindow d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $shiftMod, 1, movetoworkspace, 1
bind = $shiftMod, 2, movetoworkspace, 2
bind = $shiftMod, 3, movetoworkspace, 3
bind = $shiftMod, 4, movetoworkspace, 4
bind = $shiftMod, 5, movetoworkspace, 5
bind = $shiftMod, 6, movetoworkspace, 6
bind = $shiftMod, 7, movetoworkspace, 7
bind = $shiftMod, 8, movetoworkspace, 8
bind = $shiftMod, 9, movetoworkspace, 9
bind = $shiftMod, 0, movetoworkspace, 10

# Mail special workspace
bind = $mainMod,  B, togglespecialworkspace, mail

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize windows
binde = $ctrlMod, l, resizeactive, 30 0
binde = $ctrlMod, h, resizeactive, -30 0
binde = $ctrlMod, k, resizeactive, 0 -30
binde = $ctrlMod, j, resizeactive, 0 30
